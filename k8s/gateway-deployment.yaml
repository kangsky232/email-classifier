apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: mail-classifier
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: mail-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: mail-classifier/gateway:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: mail-config
            - secretRef:
                name: mail-secret
          readinessProbe:
            httpGet:
              path: /api/cloud/health/ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/cloud/health/live
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
