apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-acceptor-1
  namespace: mail-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-acceptor-1
  template:
    metadata:
      labels:
        app: mail-acceptor-1
    spec:
      containers:
      - name: acceptor-1
        image: mail-agent:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DASHSCOPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: dashscope
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: openai
              optional: true
        - name: ZHIPU_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: zhipu
              optional: true
        ports:
        - containerPort: 8503
        command: ["python", "agent_service.py", "--role", "security", "--port", "8503", "--id", "acceptor-1"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8503
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: mail-acceptor-1
  namespace: mail-system
spec:
  selector:
    app: mail-acceptor-1
  ports:
  - port: 8503
    targetPort: 8503
  type: ClusterIP
---
