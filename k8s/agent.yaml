apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-acceptor-1
  namespace: mail-system
  labels:
    app: mail-acceptor-1
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail-acceptor-1
  template:
    metadata:
      labels:
        app: mail-acceptor-1
        version: v1
    spec:
      containers:
      - name: acceptor-1
        image: mail-agent:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: deepseek
              optional: true
        - name: DASHSCOPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: dashscope
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: openai
              optional: true
        - name: ZHIPU_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secret
              key: zhipu
              optional: true
        ports:
        - containerPort: 8503
          name: http
        command: ["python", "agent_service.py", "--role", "security", "--port", "8503", "--id", "acceptor-1"]
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8503
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8503
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mail-acceptor-1
  namespace: mail-system
  labels:
    app: mail-acceptor-1
spec:
  selector:
    app: mail-acceptor-1
  ports:
  - port: 8503
    targetPort: 8503
    name: http
  type: ClusterIP
---
