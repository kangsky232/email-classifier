apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: mail-gateway
  namespace: mail-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "mail.local"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: mail-vs
  namespace: mail-system
spec:
  hosts:
  - "mail.local"
  gateways:
  - mail-gateway
  http:
  - match:
    - uri:
        prefix: /socket.io
    route:
    - destination:
        host: mail-app
        port:
          number: 80
    timeout: 30s
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: mail-app
        port:
          number: 80
      weight: 100
    timeout: 10s
    retries:
      attempts: 3
      perTryTimeout: 3s
    fault:
      abort:
        percentage:
          value: 0
        httpStatus: 503
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: mail-app-dr
  namespace: mail-system
spec:
  host: mail-app
  subsets:
  - name: v1
    labels:
      version: v1
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: mysql-dr
  namespace: mail-system
spec:
  host: mysql
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 50
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: rabbitmq-dr
  namespace: mail-system
spec:
  host: rabbitmq
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 50
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: acceptor-dr
  namespace: mail-system
spec:
  host: mail-acceptor-1
  trafficPolicy:
    loadBalancer:
      simple: ROUND_ROBIN
    connectionPool:
      tcp:
        maxConnections: 20
  subsets:
  - name: v1
    labels:
      app: mail-acceptor-1
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: mail-mesh-mtls
  namespace: mail-system
spec:
  mtls:
    mode: PERMISSIVE
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: mail-app-ap
  namespace: mail-system
spec:
  selector:
    matchLabels:
      app: mail-app
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"]
  - from:
    - source:
        namespaces: ["mail-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: mail-acceptor-ap
  namespace: mail-system
spec:
  selector:
    matchLabels:
      app: mail-acceptor-1
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["mail-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: acceptor-2-ap
  namespace: mail-system
spec:
  selector:
    matchLabels:
      app: mail-acceptor-2
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["mail-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: acceptor-3-ap
  namespace: mail-system
spec:
  selector:
    matchLabels:
      app: mail-acceptor-3
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["mail-system"]
---
apiVersion: telemetry.istio.io/v1alpha1
kind: Telemetry
metadata:
  name: mail-telemetry
  namespace: mail-system
spec:
  selector:
    matchLabels:
      app: mail-app
  accessLogging:
  - providers:
    - name: envoy