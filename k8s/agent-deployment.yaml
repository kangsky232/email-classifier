apiVersion: v1
kind: Service
metadata:
  name: agent-1-service
  namespace: mail-classifier
spec:
  ports:
    - port: 8503
      targetPort: 8503
  selector:
    app: agent-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-1
  namespace: mail-classifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-1
  template:
    metadata:
      labels:
        app: agent-1
    spec:
      containers:
        - name: agent
          image: mail-classifier/agent:latest
          ports:
            - containerPort: 8503
          env:
            - name: AGENT_ROLE
              value: "llm1"
            - name: AGENT_PORT
              value: "8503"
            - name: AGENT_ID
              value: "acceptor-1"
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mail-secret
                  key: DEEPSEEK_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8503
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8503
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
