apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-app
  namespace: mail-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mail-app
  template:
    metadata:
      labels:
        app: mail-app
    spec:
      containers:
      - name: app
        image: mail-app:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: mysql
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: root
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password
        - name: DB_NAME
          value: mail_system
        - name: RABBITMQ_HOST
          value: rabbitmq
        - name: RABBITMQ_PORT
          value: "5672"
        - name: ACCEPTOR_1_URL
          value: http://mail-acceptor-1:8503
        - name: ACCEPTOR_2_URL
          value: http://mail-acceptor-2:8504
        - name: ACCEPTOR_3_URL
          value: http://mail-acceptor-3:8505
        - name: FLASK_ENV
          value: production
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mail-app
  namespace: mail-system
spec:
  selector:
    app: mail-app
  ports:
  - port: 80
    targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mail-ingress
  namespace: mail-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: mail.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mail-app
            port:
              number: 80
