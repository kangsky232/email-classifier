version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mail-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mail_system
    volumes:
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - mail-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:management
    container_name: mail-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - mail-network

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: mail-app
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: mail_system
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      FLASK_ENV: development
      ACCEPTOR_1_URL: http://acceptor-1:8503
      ACCEPTOR_2_URL: http://acceptor-2:8504
      ACCEPTOR_3_URL: http://acceptor-3:8505
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "5000:5000"
    networks:
      - mail-network

  acceptor-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: mail-acceptor-1
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8503:8503"
    networks:
      - mail-network
    command: ["python", "agent_service.py", "--role", "security", "--port", "8503", "--id", "acceptor-1"]

  acceptor-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: mail-acceptor-2
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8504:8504"
    networks:
      - mail-network
    command: ["python", "agent_service.py", "--role", "business", "--port", "8504", "--id", "acceptor-2"]

  acceptor-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    container_name: mail-acceptor-3
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8505:8505"
    networks:
      - mail-network
    command: ["python", "agent_service.py", "--role", "general", "--port", "8505", "--id", "acceptor-3"]

volumes:
  mysql-data:

networks:
  mail-network:
    driver: bridge
