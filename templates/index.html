<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Classifier</title>
    <link rel="stylesheet" href="/static/css/style.css?v=3">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-mark">M</div>
                <div>
                    <h1>Email Classifier</h1>
                    <p>Multi-Agent Consensus</p>
                </div>
            </div>
            <nav class="nav-menu" aria-label="main navigation">
                <button class="nav-item active" data-page="email" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16v12H4z"/><path d="m4 7 8 6 8-6"/></svg></span>
                    <span data-i18n="nav.emails">邮件管理</span>
                </button>
                <button class="nav-item" data-page="classify" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M5 8h14"/><path d="M7 8l-3 6h6z"/><path d="M17 8l-3 6h6z"/></svg></span>
                    <span data-i18n="nav.classify">分类中心</span>
                </button>
                <button class="nav-item" data-page="monitor" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 15v-4"/><path d="M12 15V8"/><path d="M16 15v-6"/></svg></span>
                    <span data-i18n="nav.agents">Agent 监控</span>
                </button>
                <button class="nav-item" data-page="paxos" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M6 7h12"/><path d="M6 12h12"/><path d="M6 17h12"/><circle cx="4" cy="7" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="17" r="1"/></svg></span>
                    <span data-i18n="nav.paxos">Paxos 日志</span>
                </button>
                <button class="nav-item" data-page="stats" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19h16"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-4"/></svg></span>
                    <span data-i18n="nav.stats">统计分析</span>
                </button>
                <button class="nav-item" data-page="queue" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 12h4l2-6 4 12 2-6h4"/></svg></span>
                    <span data-i18n="nav.queue">消息队列</span>
                </button>
                <button class="nav-item" data-page="settings" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v3"/><path d="M12 18v3"/><path d="M3 12h3"/><path d="M18 12h3"/><path d="m5.6 5.6 2.1 2.1"/><path d="m16.3 16.3 2.1 2.1"/><path d="m18.4 5.6-2.1 2.1"/><path d="m7.7 16.3-2.1 2.1"/></svg></span>
                    <span data-i18n="nav.settings">系统设置</span>
                </button>
                <button class="nav-item" data-page="cluster" type="button">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/></svg></span>
                    <span data-i18n="nav.cluster">集群监控</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <button class="dark-toggle" type="button" onclick="App.toggleDark()">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    <span id="dark-label" data-i18n="dark.mode">暗色模式</span>
                </button>
                <button class="dark-toggle" type="button" onclick="I18N.toggle()" style="margin-top:4px;">
                    <span style="font-size:14px;">🌐</span>
                    <span id="lang-label">EN</span>
                </button>
                <button id="user-btn" class="nav-item" type="button" onclick="AuthPage.showLogin()">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg></span>
                    <span id="user-btn-text">Login</span>
                </button>
            </div>
        </aside>

        <main class="main-content">
            <section id="page-email" class="page active"></section>
            <section id="page-classify" class="page"></section>
            <section id="page-monitor" class="page"></section>
            <section id="page-paxos" class="page"></section>
            <section id="page-stats" class="page"></section>
            <section id="page-queue" class="page"></section>
            <section id="page-settings" class="page"></section>
            <section id="page-cluster" class="page"></section>
        </main>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-content" class="modal-content" role="dialog" aria-modal="true"></div>
    </div>
    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/static/js/i18n.js?v=3"></script>
    <script src="/static/js/app.js?v=3"></script>
    <script src="/static/js/email.js?v=3"></script>
    <script src="/static/js/classify.js?v=5"></script>
    <script src="/static/js/monitor.js?v=3"></script>
    <script src="/static/js/paxos.js?v=3"></script>
    <script src="/static/js/stats.js?v=3"></script>
    <script src="/static/js/queue.js?v=3"></script>
    <script src="/static/js/settings.js?v=3"></script>
    <script src="/static/js/cluster.js?v=3"></script>
    <script src="/static/js/auth.js?v=3"></script>
</body>
</html>
